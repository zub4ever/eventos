services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mfeventos_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://saas.local:8080
      APP_DOMAIN: saas.local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: saas
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

  vite:
    image: node:22-alpine
    container_name: mfeventos_vite
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_DEV_SERVER_HOST: 0.0.0.0
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: 5173
    command: sh -lc "npm ci && npm run dev"

  postgres:
    image: postgres:16-alpine
    container_name: mfeventos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mfeventos_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
